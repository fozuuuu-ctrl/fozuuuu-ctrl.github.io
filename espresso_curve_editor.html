
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.top-bar { display: flex; align-items: center; gap: 20px; padding: 10px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.sensor { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--color-text-secondary); }
.sensor i { font-size: 16px; }
.chart-area { position: relative; background: var(--color-background-primary); padding: 8px 8px 0 36px; }
canvas#curveCanvas { display: block; width: 100%; cursor: crosshair; }
.bottom-panel { display: flex; align-items: stretch; gap: 0; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); }
.info-card { padding: 14px 18px; min-width: 160px; border-right: 0.5px solid var(--color-border-tertiary); }
.info-label { font-size: 11px; color: var(--color-text-tertiary); margin-bottom: 2px; }
.info-val { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.info-sub { font-size: 11px; color: var(--color-text-tertiary); }
.volume-card { padding: 14px 18px; min-width: 160px; border-right: 0.5px solid var(--color-border-tertiary); transition: background 0.3s; }
.volume-card.updated { background: var(--color-background-success); }
.volume-val { font-size: 22px; font-weight: 500; color: var(--color-text-success); transition: color 0.3s; }
.legend-area { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; justify-content: center; flex: 1; }
.legend-row { display: flex; gap: 16px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
.legend-line { width: 22px; height: 2px; border-radius: 1px; }
.legend-line.actual { background: #378ADD; }
.legend-line.target { background: #378ADD; border-top: none; background: none; border-bottom: 2px dashed #378ADD; height: 0; }
.legend-line.flow-actual { background: #D85A30; }
.legend-line.flow-target { background: none; border-bottom: 2px dashed #D85A30; height: 0; }
.actions { padding: 10px 16px; display: flex; flex-direction: column; gap: 6px; justify-content: center; border-left: 0.5px solid var(--color-border-tertiary); }
.action-btn { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: var(--border-radius-md); color: var(--color-text-secondary); font-size: 11px; transition: background 0.15s; }
.action-btn:hover { background: var(--color-background-secondary); }
.action-btn i { font-size: 20px; }
.action-btn.active { color: #378ADD; }
.save-btn { background: #378ADD; color: #fff; border: none; border-radius: var(--border-radius-md); padding: 0 20px; font-size: 14px; font-weight: 500; cursor: pointer; min-height: 56px; align-self: stretch; margin: 10px 12px; }
.tooltip { position: absolute; pointer-events: none; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; font-size: 12px; color: var(--color-text-primary); display: none; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.mode-badge { position: absolute; top: 10px; right: 12px; background: var(--color-background-warning); color: var(--color-text-warning); font-size: 11px; padding: 3px 8px; border-radius: var(--border-radius-md); display: none; }
.delta-badge { display: inline-block; font-size: 12px; font-weight: 500; margin-left: 6px; padding: 1px 6px; border-radius: 4px; vertical-align: middle; }
.delta-up { background: var(--color-background-danger); color: var(--color-text-danger); }
.delta-down { background: var(--color-background-success); color: var(--color-text-success); }
</style>

<div style="border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-secondary);">

<div class="top-bar">
  <div class="sensor"><i class="ti ti-flame" aria-hidden="true"></i> 42 °C</div>
  <div class="sensor"><i class="ti ti-gauge" aria-hidden="true"></i> 2.3 Bar</div>
  <div class="sensor"><i class="ti ti-droplet" aria-hidden="true"></i> 36 °C</div>
  <div style="margin-left:auto; display:flex; gap:8px;">
    <button class="action-btn" id="btnAdd" title="添加定点" onclick="setMode('add')"><i class="ti ti-plus" aria-hidden="true"></i><span>添加</span></button>
    <button class="action-btn" id="btnDel" title="删除模式" onclick="setMode('delete')"><i class="ti ti-trash" aria-hidden="true"></i><span>删除</span></button>
    <button class="action-btn" title="重置" onclick="resetCurve()"><i class="ti ti-refresh" aria-hidden="true"></i><span>重置</span></button>
  </div>
</div>

<div class="chart-area" id="chartWrap">
  <canvas id="curveCanvas" height="320" aria-label="定点编辑曲线图"></canvas>
  <div class="tooltip" id="tooltip"></div>
  <div class="mode-badge" id="modeBadge"></div>
</div>

<div class="bottom-panel">
  <div class="info-card">
    <div class="info-label">跟大部分女冈村宁次</div>
    <div class="info-val" id="durVal">13</div>
    <div class="info-sub">秒</div>
  </div>
  <div class="volume-card" id="volumeCard">
    <div class="info-label">预计注水量 <span id="deltaBadge" class="delta-badge" style="display:none"></span></div>
    <div class="volume-val" id="volVal">72 ml</div>
    <div class="info-sub" id="volSub">与原曲线一致</div>
  </div>
  <div class="legend-area">
    <div class="info-label" style="margin-bottom:4px">实际 / 目标</div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-line actual"></div>压力</div>
      <div class="legend-item"><div class="legend-line target"></div>目标压力</div>
    </div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-line flow-actual"></div>流速</div>
      <div class="legend-item"><div class="legend-line flow-target"></div>目标流速</div>
    </div>
  </div>
  <button class="save-btn" onclick="saveCurve()">保存</button>
</div>
</div>

<script>
const canvas = document.getElementById('curveCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('chartWrap');

const ORIG_POINTS = [
  {t:0, p:0}, {t:1, p:3.5}, {t:2, p:3.2}, {t:3, p:7},
  {t:4, p:2.8}, {t:5, p:1.2}, {t:6, p:1.1}, {t:7, p:1.0},
  {t:8, p:1.1}, {t:9, p:1.0}, {t:10, p:2.0}, {t:11, p:1.0},
  {t:12, p:2.0}, {t:13, p:1.0}
];
const ORIG_VOL = 72;
const ORIG_DUR = 13;

let points = ORIG_POINTS.map(p => ({...p}));
let mode = 'drag';
let dragIdx = -1;
let hoverIdx = -1;
let W, H, PAD = {top:16, right:12, bottom:32, left:10};
let maxT = 14, maxP = 12;

function calcVolume(pts) {
  if (pts.length < 2) return 0;
  let area = 0;
  for (let i = 0; i < pts.length - 1; i++) {
    const dt = pts[i+1].t - pts[i].t;
    const avgP = (pts[i].p + pts[i+1].p) / 2;
    area += dt * avgP;
  }
  const origArea = (() => {
    let a = 0;
    for (let i = 0; i < ORIG_POINTS.length - 1; i++) {
      const dt = ORIG_POINTS[i+1].t - ORIG_POINTS[i].t;
      const avgP = (ORIG_POINTS[i].p + ORIG_POINTS[i+1].p) / 2;
      a += dt * avgP;
    }
    return a;
  })();
  return Math.round(ORIG_VOL * area / origArea);
}

function updateUI() {
  const dur = points.length > 0 ? points[points.length-1].t : 0;
  const vol = calcVolume(points);
  const delta = vol - ORIG_VOL;
  document.getElementById('durVal').textContent = dur;
  document.getElementById('volVal').textContent = vol + ' ml';
  const badge = document.getElementById('deltaBadge');
  const sub = document.getElementById('volSub');
  const card = document.getElementById('volumeCard');
  if (delta === 0) {
    badge.style.display = 'none';
    sub.textContent = '与原曲线一致';
    card.style.background = '';
  } else if (delta > 0) {
    badge.style.display = 'inline-block';
    badge.className = 'delta-badge delta-up';
    badge.textContent = '+' + delta + ' ml';
    sub.textContent = '需增加总注水量';
    card.style.background = 'var(--color-background-danger)';
  } else {
    badge.style.display = 'inline-block';
    badge.className = 'delta-badge delta-down';
    badge.textContent = delta + ' ml';
    sub.textContent = '可减少总注水量';
    card.style.background = 'var(--color-background-success)';
  }
  maxT = Math.max(14, dur + 2);
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  draw();
}

function toCanvas(t, p) {
  const x = PAD.left + (t / maxT) * (W - PAD.left - PAD.right);
  const y = PAD.top + (1 - p / maxP) * (H - PAD.top - PAD.bottom);
  return [x, y];
}

function fromCanvas(cx, cy) {
  const t = ((cx - PAD.left) / (W - PAD.left - PAD.right)) * maxT;
  const p = (1 - (cy - PAD.top) / (H - PAD.top - PAD.bottom)) * maxP;
  return [Math.max(0, t), Math.max(0, Math.min(maxP, p))];
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
  const textColor = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.4)';
  const pointStroke = isDark ? '#fff' : '#fff';

  ctx.font = '11px sans-serif';
  ctx.fillStyle = textColor;

  for (let p = 0; p <= maxP; p += 1) {
    const [, y] = toCanvas(0, p);
    ctx.strokeStyle = p % 2 === 0 ? gridColor : 'transparent';
    ctx.lineWidth = 0.5;
    if (p % 2 === 0) {
      ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y); ctx.stroke();
    }
    if (p % 2 === 0 && p > 0) {
      ctx.fillStyle = textColor;
      ctx.textAlign = 'right';
      ctx.fillText(p, PAD.left - 4, y + 4);
    }
  }

  for (let t = 0; t <= maxT; t += 3) {
    const [x] = toCanvas(t, 0);
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(x, PAD.top); ctx.lineTo(x, H - PAD.bottom); ctx.stroke();
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.fillText(t, x, H - PAD.bottom + 14);
  }

  if (points.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = '#378ADD';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    points.forEach((pt, i) => {
      const [x, y] = toCanvas(pt.t, pt.p);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = '#378ADD';
    ctx.setLineDash([5, 4]);
    ctx.lineWidth = 1.5;
    points.forEach((pt, i) => {
      const [x, y] = toCanvas(pt.t, pt.p);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  points.forEach((pt, i) => {
    const [x, y] = toCanvas(pt.t, pt.p);
    ctx.beginPath();
    ctx.arc(x, y, i === hoverIdx ? 7 : 5, 0, Math.PI * 2);
    ctx.fillStyle = i === hoverIdx ? '#378ADD' : '#378ADD';
    ctx.fill();
    ctx.strokeStyle = pointStroke;
    ctx.lineWidth = 2;
    ctx.stroke();

    if (i === hoverIdx) {
      ctx.font = '11px sans-serif';
      ctx.fillStyle = textColor;
      ctx.textAlign = 'center';
      ctx.fillText(pt.p.toFixed(1), x, y - 12);
    }
  });
}

function hitTest(cx, cy) {
  for (let i = 0; i < points.length; i++) {
    const [x, y] = toCanvas(points[i].t, points[i].p);
    if (Math.hypot(cx - x, cy - y) < 12) return i;
  }
  return -1;
}

function setMode(m) {
  mode = m;
  const badge = document.getElementById('modeBadge');
  const addBtn = document.getElementById('btnAdd');
  const delBtn = document.getElementById('btnDel');
  if (m === 'add') {
    badge.textContent = '+ 点击曲线添加定点';
    badge.style.display = 'block';
    addBtn.classList.add('active');
    delBtn.classList.remove('active');
    canvas.style.cursor = 'cell';
  } else if (m === 'delete') {
    badge.textContent = '🗑 点击定点删除';
    badge.style.display = 'block';
    delBtn.classList.add('active');
    addBtn.classList.remove('active');
    canvas.style.cursor = 'not-allowed';
  } else {
    badge.style.display = 'none';
    addBtn.classList.remove('active');
    delBtn.classList.remove('active');
    canvas.style.cursor = 'crosshair';
  }
}

function resetCurve() {
  points = ORIG_POINTS.map(p => ({...p}));
  maxT = 14;
  updateUI();
  draw();
  setMode('drag');
}

function saveCurve() {
  const vol = calcVolume(points);
  alert(`已保存曲线\n时长: ${points[points.length-1].t} 秒\n建议总注水量: ${vol} ml`);
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  if (mode === 'add') {
    const [t, p] = fromCanvas(cx, cy);
    const snapT = Math.round(t);
    if (!points.find(pt => pt.t === snapT)) {
      points.push({t: snapT, p: Math.round(p * 10) / 10});
      points.sort((a, b) => a.t - b.t);
      updateUI(); draw();
    }
    setMode('drag');
    return;
  }

  if (mode === 'delete') {
    const idx = hitTest(cx, cy);
    if (idx >= 0 && points.length > 2) {
      points.splice(idx, 1);
      updateUI(); draw();
    }
    setMode('drag');
    return;
  }

  const idx = hitTest(cx, cy);
  if (idx >= 0) { dragIdx = idx; canvas.style.cursor = 'grabbing'; }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;

  if (dragIdx >= 0) {
    const [, p] = fromCanvas(cx, cy);
    points[dragIdx].p = Math.round(Math.max(0, Math.min(maxP, p)) * 10) / 10;
    updateUI(); draw();

    const tip = document.getElementById('tooltip');
    tip.style.display = 'block';
    tip.style.left = (cx + 12) + 'px';
    tip.style.top = (cy - 28) + 'px';
    tip.textContent = `${points[dragIdx].t}s · ${points[dragIdx].p.toFixed(1)} Bar`;
    return;
  }

  const idx = hitTest(cx, cy);
  if (idx !== hoverIdx) { hoverIdx = idx; draw(); }
  if (idx >= 0) {
    canvas.style.cursor = mode === 'drag' ? 'grab' : canvas.style.cursor;
    const tip = document.getElementById('tooltip');
    tip.style.display = 'block';
    tip.style.left = (cx + 12) + 'px';
    tip.style.top = (cy - 28) + 'px';
    tip.textContent = `${points[idx].t}s · ${points[idx].p.toFixed(1)} Bar`;
  } else {
    document.getElementById('tooltip').style.display = 'none';
  }
});

canvas.addEventListener('mouseup', () => {
  dragIdx = -1;
  canvas.style.cursor = mode === 'drag' ? 'crosshair' : canvas.style.cursor;
  document.getElementById('tooltip').style.display = 'none';
});

canvas.addEventListener('mouseleave', () => {
  dragIdx = -1;
  hoverIdx = -1;
  document.getElementById('tooltip').style.display = 'none';
  draw();
});

window.addEventListener('resize', resize);
setTimeout(() => { resize(); updateUI(); }, 50);
</script>
